<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111214">
  <title>Abner Tattoo Studio</title>
  <link rel="icon" href="/assets/img/logo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/main.min.css">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <button class="icon-button" id="menuButton" aria-label="Abrir menu">☰</button>
    <img src="/assets/img/logo.png" alt="" class="logo">
    <div><strong>Abner Tattoo Studio</strong><small>Gestão do estúdio</small></div>
  </header>
  <aside class="sidebar" id="sidebar">
    <button class="nav-link active" data-page="agenda">Agenda</button>
    <button class="nav-link" data-page="clientes">Clientes</button>
    <button class="nav-link" data-page="financeiro">Financeiro</button>
  </aside>
  <main>
    <section id="agenda" class="page active">
      <div class="page-title"><div><span class="eyebrow">VISÃO GERAL</span><h1>Agenda</h1></div><button class="primary" data-open="appointment">+ Novo agendamento</button></div>
      <div id="calendar" class="panel calendar"></div>
      <div class="dashboard-grid">
        <div><h2>Próximos agendamentos</h2><div id="appointmentList"></div></div>
        <div><h2>Financeiro</h2><div id="financePanel"></div></div>
      </div>
    </section>
    <section id="clientes" class="page">
      <div class="page-title"><div><span class="eyebrow">CADASTRO</span><h1>Clientes</h1></div></div>
      <div class="client-grid">
        <div class="panel client-list-panel"><input id="clientSearch" placeholder="Pesquisar cliente..."><div id="clientList"></div></div>
        <div id="clientDetail" class="panel empty">Selecione um cliente</div>
      </div>
    </section>
    <section id="financeiro" class="page">
      <div class="page-title"><div><span class="eyebrow">CONTROLE</span><h1>Financeiro</h1></div></div>
      <div id="fullFinancePanel"></div>
    </section>
  </main>

  <dialog id="appointmentDialog">
    <form id="appointmentForm">
      <header><h2>Novo agendamento</h2><button type="button" class="close">×</button></header>
      <input type="hidden" name="id_cliente"><label>Nome<input name="nome" autocomplete="off" required><div id="clientSuggestions"></div></label>
      <label>Telefone<input name="telefone" required></label>
      <div class="fields"><label>Data<input type="date" name="data" required></label><label>Horário<input type="time" name="hora" required></label></div>
      <div class="fields"><label>Valor orçado<input type="number" step=".01" name="valor"></label><label>Sinal<input type="number" step=".01" name="sinal"></label></div>
      <footer><button type="button" class="secondary close">Cancelar</button><button class="primary">Salvar</button></footer>
    </form>
  </dialog>

  <dialog id="orderDialog"><div id="orderContent"></div></dialog>
  <div id="toast" role="status"></div>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
